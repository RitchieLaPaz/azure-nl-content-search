<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · Compliance Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f8f8f7;
      --surface:   #ffffff;
      --border:    #e5e5e3;
      --border-md: #d1d1ce;
      --text:      #1a1a18;
      --muted:     #6b6b68;
      --hint:      #9b9b98;
      --blue-bg:   #eff6ff;
      --blue-text: #1d4ed8;
      --blue-bdr:  #bfdbfe;
      --red-bg:    #fef2f2;
      --red-text:  #b91c1c;
      --amber-bg:  #fffbeb;
      --amber-text:#92400e;
      --amber-bdr: #fde68a;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --sans: 'Inter', system-ui, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #111110;
        --surface:   #1c1c1a;
        --border:    #2e2e2c;
        --border-md: #3e3e3b;
        --text:      #f0f0ee;
        --muted:     #9b9b98;
        --hint:      #6b6b68;
        --blue-bg:   #1e2a42;
        --blue-text: #93c5fd;
        --blue-bdr:  #1e40af;
        --red-bg:    #2a1515;
        --red-text:  #fca5a5;
        --amber-bg:  #271f0e;
        --amber-text:#fcd34d;
        --amber-bdr: #78350f;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: var(--red-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon i { font-size: 18px; color: var(--red-text); }

    .brand-text h1 { font-size: 15px; font-weight: 600; line-height: 1.3; }
    .brand-text p  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 24px;
    }

    .sign-in-label {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
      color: var(--text);
    }

    .btn-ms {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--sans);
      background: var(--text);
      color: var(--surface);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      text-decoration: none;
      transition: opacity .12s;
    }

    .btn-ms:hover { opacity: .85; }

    .ms-logo {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .dev-section {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .dev-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--amber-bg);
      color: var(--amber-text);
      border: 1px solid var(--amber-bdr);
      margin-bottom: 10px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .dev-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .btn-dev {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--sans);
      background: var(--amber-bg);
      color: var(--amber-text);
      border: 1px solid var(--amber-bdr);
      border-radius: var(--radius-md);
      cursor: pointer;
      text-decoration: none;
      transition: opacity .12s;
    }

    .btn-dev:hover { opacity: .8; }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: var(--hint);
      text-align: center;
      line-height: 1.6;
    }

    .error-box {
      background: var(--red-bg);
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--red-text);
      display: none;
      margin-bottom: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="card">

    <div class="brand">
      <div class="brand-icon"><i class="ti ti-shield-search"></i></div>
      <div class="brand-text">
        <h1>Compliance Search</h1>
        <p>Microsoft Purview · IT Security</p>
      </div>
    </div>

    <div class="divider"></div>

    <div id="error-box" class="error-box"></div>

    <p class="sign-in-label">Sign in to continue</p>

    <a href="/auth/sso" class="btn-ms">
      <svg class="ms-logo" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" fill="#F25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7FBA00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00A4EF"/>
        <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
      </svg>
      Sign in with Microsoft
    </a>

    <div class="dev-section" id="dev-section">
      <span class="dev-badge"><i class="ti ti-code" style="font-size:10px;"></i> Dev mode</span>
      <p class="dev-note">SSO bypass is active. Use this link to skip Microsoft login during testing.</p>
      <a href="/auth/dev-bypass" class="btn-dev">
        <i class="ti ti-bolt" style="font-size:14px;"></i>
        Skip login — dev bypass
      </a>
    </div>

  </div>

  <p class="footer">
    Access restricted to your organisation.<br>
    Sign in with your work Microsoft account.
  </p>
</div>

<script>
  // Show error from query string (e.g. after failed SSO callback)
  const params = new URLSearchParams(window.location.search);
  const authError = params.get('auth_error');
  if (authError) {
    const box = document.getElementById('error-box');
    box.textContent = authError;
    box.style.display = 'block';
  }

  // Check if dev bypass is enabled — show the section only if it is
  fetch('/auth/dev-status')
    .then(r => r.json())
    .then(d => {
      if (d.available) {
        document.getElementById('dev-section').style.display = 'block';
      }
    })
    .catch(() => {});
</script>
</body>
</html>
